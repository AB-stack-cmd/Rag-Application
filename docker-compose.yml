version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"   # REST API
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333   
      - REDIS_HOST=redis

volumes:
  qdrant_data: